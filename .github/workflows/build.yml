name: Build installers

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build .app bundle
        run: pyinstaller raspisanie.spec --noconfirm

      - name: Package .app into a zip
        run: |
          cd dist
          zip -r RaspisanieSPO-macOS.zip RaspisanieSPO.app

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/RaspisanieSPO-macOS.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build .exe
        run: pyinstaller raspisanie.spec --noconfirm

      - name: Rename executable
        run: Rename-Item -Path "dist\RaspisanieSPO.exe" -NewName "RaspisanieSPO-Windows.exe"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/RaspisanieSPO-Windows.exe
